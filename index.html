<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Messenger</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f0f1a;
    color:white;
}

header {
    padding:15px;
    text-align:center;
    background:#1c1c2e;
    font-size:20px;
}

nav {
    display:flex;
    justify-content:space-around;
    background:#222;
}

nav button {
    flex:1;
    padding:10px;
    border:none;
    background:none;
    color:white;
    font-size:16px;
}

.active {
    background:#00c9a7;
}

.screen {
    display:none;
    padding:10px;
}

.show {
    display:block;
}

/* чат */
.message {
    background:#2a2a40;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
}

input {
    width:70%;
    padding:10px;
    border:none;
    border-radius:10px;
}

.send {
    padding:10px;
    border:none;
    border-radius:10px;
    background:#00c9a7;
}

/* посты */
.post {
    background:#2a2a40;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}
</style>

</head>

<body>

<header>📱 Chat + Feed</header>

<nav>
    <button onclick="switchTab('chat')" id="chatBtn" class="active">💬 Чат</button>
    <button onclick="switchTab('feed')" id="feedBtn">📸 Лента</button>
</nav>

<div id="chat" class="screen show">
    <div id="messages"></div>

```
<input id="msgInput" placeholder="Сообщение...">
<button class="send" onclick="sendMsg()">Отправить</button>
```

</div>

<div id="feed" class="screen">
    <input id="postInput" placeholder="Что нового?">
    <button class="send" onclick="addPost()">Пост</button>

```
<div id="posts"></div>
```

</div>

<script>
let messages = JSON.parse(localStorage.getItem("msgs")) || [];
let posts = JSON.parse(localStorage.getItem("posts")) || [];

function switchTab(tab) {
    document.getElementById("chat").classList.remove("show");
    document.getElementById("feed").classList.remove("show");

    document.getElementById(tab).classList.add("show");

    document.getElementById("chatBtn").classList.remove("active");
    document.getElementById("feedBtn").classList.remove("active");

    document.getElementById(tab+"Btn").classList.add("active");
}

function renderMessages() {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    messages.forEach(m => {
        const div = document.createElement("div");
        div.className = "message";
        div.textContent = m;
        box.appendChild(div);
    });
}

function sendMsg() {
    const input = document.getElementById("msgInput");
    if(!input.value.trim()) return;

    messages.push(input.value);
    localStorage.setItem("msgs", JSON.stringify(messages));
    input.value="";
    renderMessages();
}

function renderPosts() {
    const box = document.getElementById("posts");
    box.innerHTML = "";

    posts.forEach(p => {
        const div = document.createElement("div");
        div.className = "post";
        div.textContent = p;
        box.appendChild(div);
    });
}

function addPost() {
    const input = document.getElementById("postInput");
    if(!input.value.trim()) return;

    posts.push(input.value);
    localStorage.setItem("posts", JSON.stringify(posts));
    input.value="";
    renderPosts();
}

renderMessages();
renderPosts();
</script>

</body>
</html>

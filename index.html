<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium Imperial OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #eee; height: 100vh; overflow: hidden; }
        .glass { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .gold { color: #d4af37; }
        .btn-gold { background: #d4af37; color: #000; font-weight: 600; transition: 0.3s; }
        .btn-gold:hover { background: #f4e07d; transform: scale(1.02); }
        .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex p-4 gap-4 h-screen">

    <nav class="w-20 glass rounded-[30px] flex flex-col items-center py-8 gap-8 shadow-2xl">
        <div class="gold text-2xl font-bold">E</div>
        <button onclick="showTab('chat')" class="p-3 hover:text-gold transition-all"><i data-lucide="message-circle"></i></button>
        <button onclick="showTab('friends')" class="p-3 hover:text-gold transition-all"><i data-lucide="user-plus"></i></button>
        <div class="mt-auto flex flex-col gap-4">
            <div id="status-dot" class="w-3 h-3 bg-red-500 rounded-full mx-auto shadow-[0_0_10px_red]"></div>
        </div>
    </nav>

    <div class="flex-1 flex flex-col gap-4 min-w-0">
        <header class="h-20 glass rounded-[25px] px-8 flex items-center justify-between">
            <div>
                <p class="text-[10px] uppercase tracking-widest text-white/30">Personal Encryption ID</p>
                <p id="my-id" class="text-sm font-mono gold cursor-pointer" onclick="copyId()">Connecting system...</p>
            </div>
            <div id="call-ui" class="hidden flex items-center gap-4 bg-red-500/10 border border-red-500/20 px-4 py-2 rounded-full text-red-500 text-xs">
                <span class="animate-pulse">● LIVE CALL</span>
                <button onclick="endCall()" class="ml-2 font-bold underline">DISCONNECT</button>
            </div>
        </header>

        <main class="flex-1 glass rounded-[35px] overflow-hidden flex relative">
            
            <section id="tab-chat" class="flex-1 flex flex-col p-6">
                <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 px-2 mb-4 scroll-smooth">
                    <div class="text-center text-white/20 text-xs py-10 italic">Начните диалог, добавив друга по ID</div>
                </div>
                <div class="flex gap-3 bg-white/5 p-2 rounded-2xl border border-white/5 focus-within:border-white/20 transition-all">
                    <input id="msg-input" type="text" placeholder="Введите сообщение..." class="flex-1 bg-transparent border-none outline-none px-4 text-sm">
                    <button onclick="sendMsg()" class="btn-gold p-3 rounded-xl"><i data-lucide="send" class="w-5 h-5"></i></button>
                </div>
            </section>

            <section id="tab-friends" class="hidden flex-1 p-10">
                <h2 class="text-2xl font-light mb-8">Network <span class="gold">Connect</span></h2>
                <div class="max-w-md space-y-6">
                    <div class="space-y-2">
                        <label class="text-xs text-white/30">ID Узла Получателя</label>
                        <div class="flex gap-2">
                            <input id="peer-id-input" type="text" class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gold/50">
                            <button onclick="connectToPeer()" class="btn-gold px-6 py-3 rounded-xl">Связаться</button>
                        </div>
                    </div>
                    <div id="active-peer" class="hidden p-4 rounded-2xl bg-white/5 border border-white/10 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-white/30">Активное соединение</p>
                            <p id="connected-id" class="text-sm font-mono gold"></p>
                        </div>
                        <button onclick="startCall()" class="p-3 bg-green-500/20 text-green-500 rounded-full hover:bg-green-500 hover:text-white transition-all">
                            <i data-lucide="phone"></i>
                        </button>
                    </div>
                </div>
            </section>

            <div class="absolute top-4 right-4 w-64 glass p-4 rounded-2xl sui-aura border-indigo-500/20">
                <div class="flex items-center gap-2 mb-2">
                    <i data-lucide="sparkles" class="w-4 h-4 text-indigo-400"></i>
                    <span class="text-[10px] font-bold uppercase text-indigo-400">SUI AI Assistant</span>
                </div>
                <p id="sui-text" class="text-[11px] text-white/50 leading-relaxed">
                    Система Elysium Imperial инициализирована. Ожидаю входящие пакеты данных.
                </p>
            </div>
        </main>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        lucide.createIcons();
        
        let peer = new Peer();
        let conn = null;
        let currentCall = null;
        let myStream = null;

        // Инициализация Peer
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            document.getElementById('status-dot').style.backgroundColor = '#22c55e';
            document.getElementById('status-dot').style.boxShadow = '0 0 10px #22c55e';
        });

        // Входящее текстовое соединение
        peer.on('connection', (c) => {
            conn = c;
            initConn();
        });

        // Входящий звонок
        peer.on('call', (call) => {
            if(confirm("Входящий голосовой вызов. Принять?")) {
                navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                    myStream = stream;
                    call.answer(stream);
                    handleCall(call);
                });
            }
        });

        function connectToPeer() {
            const peerId = document.getElementById('peer-id-input').value;
            if(!peerId) return;
            conn = peer.connect(peerId);
            initConn();
        }

        function initConn() {
            conn.on('open', () => {
                document.getElementById('active-peer').classList.remove('hidden');
                document.getElementById('connected-id').innerText = conn.peer;
                showTab('chat');
                addMsg('System', 'Зашифрованный канал установлен', 'center');
            });
            conn.on('data', (data) => {
                addMsg('Friend', data, 'left');
                playSfx('recv');
            });
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            if(!input.value || !conn) return;
            conn.send(input.value);
            addMsg('You', input.value, 'right');
            input.value = '';
            playSfx('send');
        }

        function startCall() {
            const peerId = conn.peer;
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                myStream = stream;
                const call = peer.call(peerId, stream);
                handleCall(call);
            }).catch(err => alert("Доступ к микрофону запрещен или недоступен по HTTP. Используйте HTTPS или Localhost."));
        }

        function handleCall(call) {
            currentCall = call;
            document.getElementById('call-ui').classList.remove('hidden');
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-audio').srcObject = remoteStream;
            });
            call.on('close', endCall);
        }

        function endCall() {
            if(currentCall) currentCall.close();
            if(myStream) myStream.getTracks().forEach(t => t.stop());
            document.getElementById('call-ui').classList.add('hidden');
        }

        // Интерфейсные функции
        function showTab(tab) {
            document.getElementById('tab-chat').classList.toggle('hidden', tab !== 'chat');
            document.getElementById('tab-friends').classList.toggle('hidden', tab !== 'friends');
        }

        function addMsg(user, text, side) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `flex ${side === 'right' ? 'justify-end' : side === 'left' ? 'justify-start' : 'justify-center'}`;
            
            let style = side === 'right' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white/5 border border-white/10 text-white rounded-tl-none';
            if(side === 'center') style = 'text-white/20 text-[10px] uppercase tracking-widest';

            div.innerHTML = `<div class="msg-bubble ${style}">${side !== 'center' ? `<p class="text-[10px] opacity-40 mb-1">${user}</p>` : ''}${text}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function copyId() {
            const id = document.getElementById('my-id').innerText;
            navigator.clipboard.writeText(id);
            document.getElementById('sui-text').innerText = "Ваш ID скопирован в буфер обмена. Передайте его собеседнику.";
        }

        function playSfx(type) {
            const audio = new Audio(type === 'send' ? 
                'https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3' : 
                'https://assets.mixkit.co/active_storage/sfx/2357/2357-preview.mp3');
            audio.volume = 0.1;
            audio.play();
        }

        document.getElementById('msg-input').addEventListener('keypress', e => { if(e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>

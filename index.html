<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Sync | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #050505;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .neo-glass {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .accent-glow {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .message-anim {
            animation: slideUp 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center p-0 md:p-6 bg-[radial-gradient(ellipse_at_bottom_right,_var(--tw-gradient-stops))] from-indigo-900/20 via-black to-black">

    <div class="neo-glass w-full h-full max-w-7xl flex flex-col md:flex-row overflow-hidden rounded-none md:rounded-[40px]">
        
        <aside class="w-full md:w-24 border-b md:border-b-0 md:border-r border-white/5 flex md:flex-col items-center py-4 md:py-10 gap-6 px-4">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center accent-glow mb-0 md:mb-6">
                <i data-lucide="component" class="text-white w-7 h-7"></i>
            </div>
            
            <nav class="flex flex-row md:flex-col gap-4 flex-1 justify-center">
                <button onclick="switchMode('chat')" id="btn-chat" class="p-4 rounded-2xl bg-indigo-600 text-white transition-all shadow-lg">
                    <i data-lucide="message-square"></i>
                </button>
                <button onclick="switchMode('tasks')" id="btn-tasks" class="p-4 rounded-2xl text-white/40 hover:text-white transition-all">
                    <i data-lucide="check-square"></i>
                </button>
                <button onclick="openExternal()" class="p-4 rounded-2xl text-white/40 hover:text-pink-500 transition-all">
                    <i data-lucide="share-2"></i>
                </button>
            </nav>

            <button class="p-4 rounded-2xl text-white/20 hover:text-white mt-auto hidden md:block">
                <i data-lucide="settings"></i>
            </button>
        </aside>

        <main class="flex-1 flex flex-col min-w-0">
            <header class="h-20 px-8 flex items-center justify-between border-b border-white/5">
                <div>
                    <h1 id="view-title" class="text-2xl font-bold tracking-tighter">AURA_SYNC // CHAT</h1>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-[10px] uppercase tracking-widest text-white/30">System Active</span>
                    </div>
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden">
                <div id="chat-view" class="flex-1 flex flex-col bg-black/20">
                    <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scroll">
                        </div>
                    
                    <div class="p-6 bg-white/[0.02]">
                        <div class="flex gap-4 bg-white/5 p-2 rounded-3xl border border-white/10 focus-within:border-indigo-500/50 transition-all">
                            <input id="chat-input" type="text" placeholder="Введите команду или сообщение..." class="flex-1 bg-transparent border-none outline-none px-4 text-sm">
                            <button onclick="sendMsg()" class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
                                <i data-lucide="send" class="w-5 h-5 text-white"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="tasks-view" class="hidden flex-1 p-8 overflow-y-auto custom-scroll">
                    <h3 class="text-xl font-bold mb-6">Текущие протоколы</h3>
                    <div id="tasks-list" class="grid gap-4">
                        </div>
                </div>
            </div>
        </main>

        <aside class="w-full md:w-80 border-t md:border-t-0 md:border-l border-white/5 bg-black/40 p-6 hidden lg:block">
            <h4 class="text-xs font-bold text-white/30 uppercase tracking-[0.2em] mb-6">Quick Link Hub</h4>
            <div class="space-y-3">
                <a href="https://web.whatsapp.com" target="_blank" class="flex items-center justify-between p-4 bg-white/5 rounded-2xl hover:bg-green-500/10 transition-group group">
                    <div class="flex items-center gap-3">
                        <i data-lucide="message-circle" class="text-green-500"></i>
                        <span class="text-sm font-medium">WhatsApp</span>
                    </div>
                    <i data-lucide="arrow-up-right" class="w-4 h-4 opacity-0 group-hover:opacity-100 transition-all"></i>
                </a>
                <a href="https://instagram.com" target="_blank" class="flex items-center justify-between p-4 bg-white/5 rounded-2xl hover:bg-pink-500/10 transition-group group">
                    <div class="flex items-center gap-3">
                        <i data-lucide="instagram" class="text-pink-500"></i>
                        <span class="text-sm font-medium">Instagram</span>
                    </div>
                    <i data-lucide="arrow-up-right" class="w-4 h-4 opacity-0 group-hover:opacity-100 transition-all"></i>
                </a>
            </div>
        </aside>
    </div>

    <script>
        lucide.createIcons();

        // --- ЗВУКОВОЙ ДВИЖОК ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type, duration = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- ЛОГИКА ЧАТА ---
        let chatHistory = JSON.parse(localStorage.getItem('aura_msgs')) || [
            { role: 'ai', text: 'Система Aura Sync запущена. Ожидаю указаний.' }
        ];

        function renderChat() {
            const box = document.getElementById('chat-box');
            box.innerHTML = chatHistory.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} message-anim">
                    <div class="max-w-[80%] p-4 rounded-3xl ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white/5 text-white/80 rounded-tl-none border border-white/5'}">
                        <p class="text-sm">${m.text}</p>
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;

            playSfx(600, 'sine');
            chatHistory.push({ role: 'user', text: input.value });
            localStorage.setItem('aura_msgs', JSON.stringify(chatHistory));
            
            const userText = input.value.toLowerCase();
            input.value = '';
            renderChat();

            // Маленький "ИИ" ответ
            setTimeout(() => {
                playSfx(400, 'triangle', 0.2);
                let reply = "Запрос обработан. Данные сохранены в локальном узле.";
                if(userText.includes("привет")) reply = "Приветствую! Чем сегодня займемся?";
                
                chatHistory.push({ role: 'ai', text: reply });
                localStorage.setItem('aura_msgs', JSON.stringify(chatHistory));
                renderChat();
            }, 800);
        }

        // --- ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ---
        function switchMode(mode) {
            playSfx(200, 'square', 0.05);
            const isChat = mode === 'chat';
            document.getElementById('chat-view').classList.toggle('hidden', !isChat);
            document.getElementById('tasks-view').classList.toggle('hidden', isChat);
            document.getElementById('view-title').innerText = isChat ? 'AURA_SYNC // CHAT' : 'AURA_SYNC // TASKS';
            
            document.getElementById('btn-chat').className = isChat ? 'p-4 rounded-2xl bg-indigo-600 text-white shadow-lg' : 'p-4 rounded-2xl text-white/40';
            document.getElementById('btn-tasks').className = !isChat ? 'p-4 rounded-2xl bg-indigo-600 text-white shadow-lg' : 'p-4 rounded-2xl text-white/40';
            
            if(!isChat) renderTasks();
        }

        // --- ЗАДАЧИ ---
        let tasks = JSON.parse(localStorage.getItem('aura_tasks')) || ["Создать крутой UI", "Настроить звуки"];
        function renderTasks() {
            const list = document.getElementById('tasks-list');
            list.innerHTML = tasks.map((t, i) => `
                <div class="p-4 bg-white/5 border border-white/5 rounded-2xl flex items-center justify-between group hover:border-indigo-500/30 transition-all">
                    <span class="text-sm">${t}</span>
                    <button onclick="deleteTask(${i})" class="text-white/20 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('') + `
                <button onclick="addTask()" class="p-4 border border-dashed border-white/10 rounded-2xl text-white/30 hover:text-white transition-all text-sm">+ Добавить новый протокол</button>
            `;
            lucide.createIcons();
        }

        function addTask() {
            const t = prompt("Название задачи:");
            if(t) {
                tasks.push(t);
                localStorage.setItem('aura_tasks', JSON.stringify(tasks));
                renderTasks();
            }
        }

        function deleteTask(i) {
            tasks.splice(i, 1);
            localStorage.setItem('aura_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        // Слушатель Enter
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMsg();
        });

        window.onload = renderChat;
    </script>
</body>
</html>

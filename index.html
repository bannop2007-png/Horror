<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ECHOES OF DARKNESS - Full Release</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Roboto:wght@400;700&display=swap');

        :root { --blood: #8a0000; --dark: #050505; }
        body { margin: 0; overflow: hidden; background: var(--dark); font-family: 'Roboto', sans-serif; color: #fff; user-select: none; }
        
        /* UI LAYERS */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; transition: opacity 0.5s; }
        .hidden { opacity: 0; pointer-events: none; display: none !important; }
        
        h1 { font-family: 'Creepster', cursive; font-size: 4rem; color: var(--blood); text-shadow: 0 0 20px red; margin: 0 0 20px 0; text-align: center; }
        p { color: #aaa; margin-bottom: 30px; text-align: center; max-width: 600px; padding: 0 20px; }
        
        .btn { background: transparent; border: 2px solid var(--blood); color: #fff; padding: 15px 40px; font-size: 1.5rem; margin: 10px; cursor: pointer; font-family: 'Creepster', cursive; transition: 0.3s; min-width: 200px; text-transform: uppercase; }
        .btn:hover { background: var(--blood); box-shadow: 0 0 20px var(--blood); transform: scale(1.05); }
        .btn-small { font-size: 1rem; padding: 10px 20px; min-width: 150px; }

        /* HUD */
        #hud { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; }
        .stat-box { background: rgba(0,0,0,0.6); border-left: 4px solid var(--blood); padding: 10px; min-width: 150px; }
        .bar { width: 100%; height: 8px; background: #333; margin-top: 5px; }
        .fill { height: 100%; width: 100%; background: #d32f2f; transition: width 0.2s; }
        #keys-display { color: gold; font-size: 1.5rem; font-weight: bold; text-align: right; border: none; border-right: 4px solid gold; }

        /* MOBILE CONTROLS */
        #mobile-controls { display: none; position: absolute; bottom: 20px; left: 0; width: 100%; height: 150px; pointer-events: none; }
        .touch-zone { position: absolute; bottom: 20px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); pointer-events: auto; touch-action: none; }
        #joystick-left { left: 20px; }
        #joystick-right { right: 20px; display: none; } /* Right stick for look */
        .action-btn { position: absolute; width: 60px; height: 60px; background: rgba(138, 0, 0, 0.5); border-radius: 50%; border: 2px solid red; color: white; font-weight: bold; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; pointer-events: auto; user-select: none; }
        #btn-run { bottom: 40px; right: 160px; }
        #btn-interact { bottom: 110px; right: 40px; }
        #btn-flash { bottom: 40px; right: 40px; }

        /* EFFECTS */
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 150px black; pointer-events: none; z-index: 5; }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 50%, red 150%); opacity: 0; pointer-events: none; z-index: 6; transition: opacity 0.2s; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; }

        /* SETTINGS MODAL */
        #settings-modal { background: rgba(0,0,0,0.95); padding: 40px; border: 1px solid #333; max-width: 500px; width: 90%; }
        .setting-row { display: flex; justify-content: space-between; margin: 15px 0; align-items: center; }
        select, input { background: #222; color: white; border: 1px solid #444; padding: 5px; }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            #mobile-controls { display: block; }
            #crosshair { display: none; }
            .desktop-only { display: none; }
        }
    </style>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- 3D Container -->
    <div id="game-container"></div>
    
    <!-- Effects -->
    <div id="vignette"></div>
    <div id="damage-overlay"></div>
    <div id="crosshair"></div>

    <!-- UI Layer -->
    <div id="ui-layer">
        
        <!-- MAIN MENU -->
        <div id="main-menu" class="screen">
            <h1>ECHOES OF DARKNESS</h1>
            <p>Выживи в лабиринте. Найди 5 ключей. Избегай МОНСТРА.</p>
            <button class="btn" onclick="showDeviceSelect()">PLAY</button>
            <button class="btn btn-small" onclick="openSettings()">Settings</button>
            <p id="version" style="font-size: 0.7rem; margin-top: 20px;">v2.0 FULL RELEASE</p>
        </div>

        <!-- DEVICE SELECT -->
        <div id="device-select" class="screen hidden">
            <h2>SELECT PLATFORM</h2>
            <button class="btn" onclick="startGame('pc')">🖥 PC (WASD + Mouse)</button>
            <button class="btn" onclick="startGame('mobile')">📱 Mobile (Touch)</button>
            <button class="btn btn-small" onclick="showMainMenu()">Back</button>
        </div>

        <!-- SETTINGS -->
        <div id="settings-screen" class="screen hidden">
            <div id="settings-modal">
                <h2 style="font-family:'Creepster'; color:var(--blood); text-align:center;">SETTINGS</h2>
                <div class="setting-row">
                    <span>Sensitivity</span>
                    <input type="range" id="sens-slider" min="1" max="10" value="5">
                </div>
                <div class="setting-row">
                    <span>Graphics</span>
                    <select id="gfx-select">
                        <option value="low">Low</option>
                        <option value="high" selected>High</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span>Sound Volume</span>
                    <input type="range" id="vol-slider" min="0" max="100" value="80">
                </div>
                <button class="btn btn-small" style="width:100%" onclick="saveSettings(); showMainMenu()">Save & Back</button>
            </div>
        </div>

        <!-- PAUSE -->
        <div id="pause-menu" class="screen hidden">
            <h2>PAUSED</h2>
            <button class="btn" onclick="resumeGame()">Resume</button>
            <button class="btn btn-small" onclick="quitToMenu()">Quit</button>
        </div>

        <!-- GAME OVER -->
        <div id="game-over" class="screen hidden">
            <h1 style="color: darkred;">YOU DIED</h1>
            <p id="death-msg">The monster caught you.</p>
            <button class="btn" onclick="resetGame()">Try Again</button>
            <button class="btn btn-small" onclick="showMainMenu()">Menu</button>
        </div>

        <!-- VICTORY -->
        <div id="victory" class="screen hidden">
            <h1 style="color: gold;">ESCAPED!</h1>
            <p>You found all keys and survived.</p>
            <button class="btn" onclick="resetGame()">Play Again</button>
            <button class="btn btn-small" onclick="showMainMenu()">Menu</button>
        </div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="stat-box">
                <div style="font-size:0.8rem; color:#aaa;">HEALTH</div>
                <div class="bar"><div id="hp-fill" class="fill"></div></div>
                <div style="font-size:0.8rem; color:#aaa; margin-top:5px;">STAMINA</div>
                <div class="bar"><div id="st-fill" class="fill" style="background:#ffca28;"></div></div>
            </div>
            <div id="keys-display" class="stat-box">
                KEYS: <span id="key-count">0</span>/5
            </div>
        </div>

        <!-- MOBILE CONTROLS -->
        <div id="mobile-controls">
            <div id="joystick-left" class="touch-zone"></div>
            <div id="btn-run" class="action-btn" ontouchstart="isRun=true" ontouchend="isRun=false">RUN</div>
            <div id="btn-interact" class="action-btn" ontouchstart="interact()">E</div>
            <div id="btn-flash" class="action-btn" ontouchstart="toggleFlash()">F</div>
        </div>
    </div>

<script>
/**
 * FULL GAME LOGIC - SINGLE FILE ARCHITECTURE
 */

// --- CONFIG & STATE ---
const CFG = {
    speed: 6, run: 11, sens: 0.002, enemySpeed: 5.5, viewDist: 25
};
let state = {
    playing: false, paused: false, hp: 100, stam: 100, keys: 0, platform: 'pc',
    settings: { sens: 5, gfx: 'high', vol: 0.8 }
};

// --- THREE.JS GLOBALS ---
let scene, camera, renderer, controls;
let playerVel = new THREE.Vector3(), playerDir = new THREE.Vector3();
let walls = [], collectibles = [], enemy = null;
let clock = new THREE.Clock();
let audioCtx, masterGain;

// --- INPUT FLAGS ---
let moveF=false, moveB=false, moveL=false, moveR=false, isRun=false;
let touchStartPos = {x:0, y:0};
let joystickActive = false;

// --- INITIALIZATION ---
function init() {
    // Scene
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.FogExp2(0x050505, 0.03);

    // Camera
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
    
    // Renderer
    renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('game-container').appendChild(renderer.domElement);

    // Lights
    const amb = new THREE.AmbientLight(0x404040, 0.2);
    scene.add(amb);
    
    // Flashlight
    const flash = new THREE.SpotLight(0xffffff, 1.5, 40, Math.PI/6, 0.5, 1);
    flash.position.set(0,0,0);
    flash.target.position.set(0,0,-1);
    camera.add(flash);
    camera.add(flash.target);
    scene.add(camera);

    // Listeners
    window.addEventListener('resize', onResize);
    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);
    
    // Touch Listeners
    setupTouchControls();

    loadSettings();
    animate();
}

// --- AUDIO SYSTEM (Procedural) ---
function initAudio() {
    if(!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = state.settings.vol;
        masterGain.connect(audioCtx.destination);
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(masterGain);
    const now = audioCtx.currentTime;

    if(type === 'step') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(100, now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now+0.1);
        osc.start(now); osc.stop(now+0.1);
    } else if(type === 'key') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now+0.3);
        osc.start(now); osc.stop(now+0.3);
    } else if(type === 'scare') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, now);
        osc.frequency.exponentialRampToValueAtTime(20, now+0.5);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0, now+0.5);
        osc.start(now); osc.stop(now+0.5);
    } else if(type === 'hit') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(50, now);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now+0.2);
        osc.start(now); osc.stop(now+0.2);
    }
}

// --- GAME FLOW ---
function showDeviceSelect() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('device-select').classList.remove('hidden');
}

function startGame(platform) {
    state.platform = platform;
    initAudio();
    
    // Reset State
    state.hp = 100; state.stam = 100; state.keys = 0;
    state.playing = true; state.paused = false;
    
    // UI
    document.getElementById('device-select').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    updateUI();

    // Generate World
    generateLevel();

    // Controls Setup
    if(platform === 'pc') {
        controls = new PointerLockControls(camera, document.body);
        controls.lock();
        controls.addEventListener('unlock', () => {
            if(state.playing) pauseGame();
        });
    } else {
        // Mobile: No pointer lock, use touch
        document.getElementById('mobile-controls').style.display = 'block';
    }
}

function pauseGame() {
    state.paused = true;
    document.getElementById('pause-menu').classList.remove('hidden');
    if(state.platform === 'pc') controls.unlock();
}

function resumeGame() {
    state.paused = false;
    document.getElementById('pause-menu').classList.add('hidden');
    if(state.platform === 'pc') controls.lock();
}

function quitToMenu() {
    state.playing = false;
    document.getElementById('pause-menu').classList.add('hidden');
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('main-menu').classList.remove('hidden');
    if(state.platform === 'pc') controls.unlock();
    // Clear scene
    while(scene.children.length > 0) scene.remove(scene.children[0]);
    scene.add(camera); // Keep camera
}

function showMainMenu() {
    quitToMenu();
}

function resetGame() {
    document.getElementById('game-over').classList.add('hidden');
    document.getElementById('victory').classList.add('hidden');
    startGame(state.platform);
}

function gameOver() {
    state.playing = false;
    document.getElementById('game-over').classList.remove('hidden');
    document.getElementById('hud').classList.add('hidden');
    if(state.platform === 'pc') controls.unlock();
}

function victory() {
    state.playing = false;
    document.getElementById('victory').classList.remove('hidden');
    document.getElementById('hud').classList.add('hidden');
    if(state.platform === 'pc') controls.unlock();
}

// --- WORLD GENERATION ---
function generateLevel() {
    // Clear old
    walls.forEach(w => scene.remove(w));
    collectibles.forEach(c => scene.remove(c.mesh));
    if(enemy) scene.remove(enemy.mesh);
    walls = []; collectibles = [];

    // Maze Gen (Simple Grid)
    const size = 21;
    const cell = 5;
    const map = [];
    for(let y=0; y<size; y++) {
        map[y] = [];
        for(let x=0; x<size; x++) {
            // Borders + Random Walls
            if(x===0 || x===size-1 || y===0 || y===size-1) map[y][x] = 1;
            else map[y][x] = (Math.random() > 0.7) ? 1 : 0;
        }
    }
    map[1][1] = 0; // Start clear

    // Build Walls
    const geo = new THREE.BoxGeometry(cell, 4, cell);
    const mat = new THREE.MeshStandardMaterial({color: 0x333333});
    
    for(let y=0; y<size; y++) {
        for(let x=0; x<size; x++) {
            if(map[y][x] === 1) {
                const w = new THREE.Mesh(geo, mat);
                w.position.set(x*cell - size*cell/2, 2, y*cell - size*cell/2);
                w.castShadow = true; w.receiveShadow = true;
                scene.add(w);
                walls.push(w);
            }
        }
    }

    // Floor
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(size*cell, size*cell),
        new THREE.MeshStandardMaterial({color: 0x111111})
    );
    floor.rotation.x = -Math.PI/2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Player Pos
    camera.position.set(1*cell - size*cell/2, 1.7, 1*cell - size*cell/2);

    // Items
    spawnItem('key', 5);
    spawnItem('coin', 10);

    // Enemy
    createEnemy();
}

function spawnItem(type, count) {
    const geo = type==='key' ? new THREE.TorusKnotGeometry(0.3,0.1,16,8) : new THREE.CylinderGeometry(0.2,0.2,0.1,16);
    const mat = new THREE.MeshStandardMaterial({
        color: type==='key'?0xffd700:0xc0c0c0,
        emissive: type==='key'?0xaa6600:0x000000,
        emissiveIntensity: 0.5
    });
    
    for(let i=0; i<count; i++) {
        let x, z;
        do {
            x = Math.floor(Math.random()*19)+1;
            z = Math.floor(Math.random()*19)+1;
        } while(getWall(x,z)); // Simple check
        
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x*5 - 52.5, 1, z*5 - 52.5);
        scene.add(mesh);
        collectibles.push({mesh, type, active:true});
    }
}

function getWall(gx, gy) {
    // Simplified collision check based on grid logic above
    // In real app, store grid globally
    return false; 
}

// --- ENEMY SYSTEM ---
function createEnemy() {
    const group = new THREE.Group();
    
    // Body
    const mat = new THREE.MeshStandardMaterial({color: 0x1a1a1a});
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1.2, 4, 8), mat);
    body.position.y = 1.6;
    group.add(body);
    
    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), mat);
    head.position.set(0, 2.4, 0);
    head.scale.set(1, 1.4, 0.8);
    group.add(head);
    
    // Eyes
    const eyeMat = new THREE.MeshBasicMaterial({color: 0xff0000});
    const e1 = new THREE.Mesh(new THREE.SphereGeometry(0.08), eyeMat);
    e1.position.set(-0.15, 2.45, 0.28);
    const e2 = new THREE.Mesh(new THREE.SphereGeometry(0.06), eyeMat);
    e2.position.set(0.16, 2.42, 0.29);
    group.add(e1); group.add(e2);
    
    // Light
    const light = new THREE.PointLight(0xff0000, 1, 8);
    light.position.set(0, 2, 0);
    group.add(light);
    
    group.position.set(20, 0, 20); // Far spawn
    scene.add(group);
    
    enemy = { mesh: group, state: 'PATROL', target: null, wait: 0 };
}

function updateEnemy(delta, time) {
    if(!enemy) return;
    const pos = enemy.mesh.position;
    const pPos = camera.position;
    const dist = pos.distanceTo(pPos);
    
    // Logic
    if(dist < CFG.viewDist && Math.random() > 0.05) { // Simple sight
        enemy.state = 'CHASE';
        playSound('scare');
    }
    
    if(enemy.state === 'CHASE') {
        const dir = pPos.clone().sub(pos).normalize();
        dir.y = 0;
        pos.add(dir.multiplyScalar(CFG.enemySpeed * delta));
        enemy.mesh.lookAt(pPos.x, pos.y, pPos.z);
        
        // Attack
        if(dist < 1.5) {
            state.hp -= 1;
            playSound('hit');
            document.getElementById('damage-overlay').style.opacity = 0.8;
            setTimeout(()=>document.getElementById('damage-overlay').style.opacity=0, 200);
            if(state.hp <= 0) gameOver();
        }
    } else {
        // Patrol idle animation
        enemy.mesh.position.y = Math.sin(time*2)*0.1;
    }
    
    updateUI();
}

// --- INPUT HANDLING ---
function onKeyDown(e) {
    switch(e.code) {
        case 'KeyW': moveF=true; break;
        case 'KeyS': moveB=true; break;
        case 'KeyA': moveL=true; break;
        case 'KeyD': moveR=true; break;
        case 'ShiftLeft': isRun=true; break;
        case 'KeyF': toggleFlash(); break;
        case 'KeyE': interact(); break;
        case 'Escape': if(state.playing) pauseGame(); break;
    }
}
function onKeyUp(e) {
    switch(e.code) {
        case 'KeyW': moveF=false; break;
        case 'KeyS': moveB=false; break;
        case 'KeyA': moveL=false; break;
        case 'KeyD': moveR=false; break;
        case 'ShiftLeft': isRun=false; break;
    }
}

function setupTouchControls() {
    const joy = document.getElementById('joystick-left');
    joy.addEventListener('touchstart', (e) => {
        joystickActive = true;
        touchStartPos.x = e.touches[0].clientX;
        touchStartPos.y = e.touches[0].clientY;
    });
    joy.addEventListener('touchmove', (e) => {
        if(!joystickActive) return;
        const dx = e.touches[0].clientX - touchStartPos.x;
        const dy = e.touches[0].clientY - touchStartPos.y;
        
        moveF = dy < -20; moveB = dy > 20;
        moveL = dx < -20; moveR = dx > 20;
    });
    joy.addEventListener('touchend', () => {
        joystickActive = false;
        moveF=moveB=moveL=moveR=false;
    });
    
    // Look around on mobile (right side of screen)
    document.addEventListener('touchmove', (e) => {
        if(e.touches[0].clientX > window.innerWidth/2 && !e.target.closest('.action-btn')) {
            const dx = e.movementX || 0;
            const dy = e.movementY || 0;
            camera.rotation.y -= dx * 0.005;
            camera.rotation.x -= dy * 0.005;
            camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
        }
    });
}

function toggleFlash() {
    const light = camera.children[0];
    if(light) light.intensity = light.intensity > 0 ? 0 : 1.5;
}

function interact() {
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = ray.intersectObjects(collectibles.map(c=>c.mesh));
    
    if(hits.length && hits[0].distance < 3) {
        const item = collectibles.find(c=>c.mesh===hits[0].object);
        if(item && item.active) {
            item.active = false;
            scene.remove(item.mesh);
            if(item.type === 'key') {
                state.keys++;
                playSound('key');
                if(state.keys >= 5) victory();
            }
            updateUI();
        }
    }
}

// --- SETTINGS & UTILS ---
function openSettings() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('settings-screen').classList.remove('hidden');
}

function saveSettings() {
    state.settings.sens = document.getElementById('sens-slider').value;
    state.settings.gfx = document.getElementById('gfx-select').value;
    state.settings.vol = document.getElementById('vol-slider').value / 100;
    if(masterGain) masterGain.gain.value = state.settings.vol;
    localStorage.setItem('horror_settings', JSON.stringify(state.settings));
}

function loadSettings() {
    const s = localStorage.getItem('horror_settings');
    if(s) {
        state.settings = JSON.parse(s);
        document.getElementById('sens-slider').value = state.settings.sens;
        document.getElementById('vol-slider').value = state.settings.vol * 100;
    }
}

function updateUI() {
    document.getElementById('hp-fill').style.width = state.hp + '%';
    document.getElementById('st-fill').style.width = state.stam + '%';
    document.getElementById('key-count').innerText = state.keys;
}

function onResize() {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// --- MAIN LOOP ---
function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.1);
    const time = clock.getElapsedTime();

    if(state.playing && !state.paused) {
        // Movement
        const speed = isRun ? CFG.run : CFG.speed;
        const direction = new THREE.Vector3();
        
        if(state.platform === 'pc') {
            direction.z = Number(moveF) - Number(moveB);
            direction.x = Number(moveR) - Number(moveL);
            direction.normalize();
            
            if(moveF || moveB) playerVel.z -= direction.z * speed * 10.0 * delta;
            if(moveL || moveR) playerVel.x -= direction.x * speed * 10.0 * delta;
            
            controls.moveRight(-playerVel.x * delta);
            controls.moveForward(-playerVel.z * delta);
            
            // Friction
            playerVel.x -= playerVel.x * 10.0 * delta;
            playerVel.z -= playerVel.z * 10.0 * delta;
            
            // Steps
            if((moveF||moveB||moveL||moveR) && Math.random()<0.1) playSound('step');
        } else {
            // Mobile simple move
            if(moveF) controls.moveForward(-speed * delta);
            if(moveB) controls.moveForward(speed * delta);
            if(moveL) controls.moveRight(-speed * delta);
            if(moveR) controls.moveRight(speed * delta);
        }
        
        // Stamina
        if(isRun && (moveF||moveB||moveL||moveR)) {
            state.stam = Math.max(0, state.stam - 20*delta);
        } else {
            state.stam = Math.min(100, state.stam + 10*delta);
        }
        if(state.stam === 0) isRun = false;

        // Enemy
        updateEnemy(delta, time);
        
        // Items Animation
        collectibles.forEach(c => {
            if(c.active) {
                c.mesh.rotation.y += delta;
                c.mesh.position.y = 1 + Math.sin(time*3)*0.2;
            }
        });
        
        updateUI();
    }
    
    renderer.render(scene, camera);
}

// PointerLockControls Polyfill (Simple version for single file)
function PointerLockControls(camera, domElement) {
    this.camera = camera;
    this.domElement = domElement;
    this.isLocked = false;
    
    const scope = this;
    
    function changeEvent() {
        scope.isLocked = !(document.pointerLockElement !== domElement);
    }
    
    function mouseEvent(e) {
        if(scope.isLocked) {
            const movementX = e.movementX || e.mozMovementX || e.webkitMovementX || 0;
            const movementY = e.movementY || e.mozMovementY || e.webkitMovementY || 0;
            
            scope.camera.rotation.y -= movementX * state.settings.sens * 0.001;
            scope.camera.rotation.x -= movementY * state.settings.sens * 0.001;
            scope.camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, scope.camera.rotation.x));
        }
    }
    
    domElement.addEventListener('pointerlockchange', changeEvent, false);
    domElement.addEventListener('mousemove', mouseEvent, false);
    
    this.lock = function() { this.domElement.requestPointerLock(); };
    this.unlock = function() { document.exitPointerLock(); };
    
    this.moveForward = function(distance) {
        const vector = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion);
        vector.y = 0; vector.normalize();
        this.camera.position.addScaledVector(vector, distance);
    };
    this.moveRight = function(distance) {
        const vector = new THREE.Vector3(1, 0, 0).applyQuaternion(this.camera.quaternion);
        vector.y = 0; vector.normalize();
        this.camera.position.addScaledVector(vector, distance);
    };
}

// Start
init();
</script>

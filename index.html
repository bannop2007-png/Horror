<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium | Private Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0a0a0b;
            color: #a1a1aa;
            height: 100vh;
            overflow: hidden;
        }

        .elite-border {
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gold-text {
            background: linear-gradient(to right, #d4af37, #f4e07d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Cinzel', serif;
        }

        .sui-gradient {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .chat-input-focus:focus-within {
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .msg-anim {
            animation: fadeInBlur 0.5s ease-out forwards;
        }

        @keyframes fadeInBlur {
            from { opacity: 0; filter: blur(10px); transform: translateY(10px); }
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center p-0 md:p-10">

    <div class="w-full h-full max-w-[1400px] bg-[#0e0e10] elite-border rounded-[40px] flex overflow-hidden shadow-[0_0_100px_rgba(0,0,0,1)]">
        
        <aside class="w-24 border-r border-white/5 flex flex-col items-center py-10 gap-10">
            <div class="text-2xl font-bold gold-text">E</div>
            
            <nav class="flex flex-col gap-8">
                <button onclick="changeView('main')" class="text-white/20 hover:text-white transition-all"><i data-lucide="home"></i></button>
                <button onclick="changeView('sui')" class="text-indigo-400 hover:scale-110 transition-all drop-shadow-[0_0_8px_rgba(99,102,241,0.5)]"><i data-lucide="sparkles"></i></button>
                <button class="text-white/20 hover:text-white transition-all"><i data-lucide="folder-kanban"></i></button>
            </nav>

            <div class="mt-auto mb-4">
                <div class="w-10 h-10 rounded-full border border-white/10 p-1">
                    <div class="w-full h-full bg-gradient-to-tr from-zinc-800 to-zinc-600 rounded-full"></div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="h-24 px-12 flex items-center justify-between border-b border-white/5">
                <div>
                    <h2 id="header-title" class="text-xs uppercase tracking-[0.5em] text-white/30 font-bold">Workspace // Central</h2>
                    <h1 id="header-main" class="text-xl text-white font-light">Добро пожаловать в <span class="gold-text">Elysium</span></h1>
                </div>
                <div class="flex items-center gap-6">
                    <div class="text-right hidden md:block">
                        <p class="text-[10px] text-white/20 uppercase tracking-widest">System Status</p>
                        <p class="text-xs text-green-500/80 font-medium">Optimal Encryption</p>
                    </div>
                    <i data-lucide="command" class="text-white/10 w-5 h-5"></i>
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden">
                <div class="flex-1 flex flex-col relative">
                    <div id="chat-box" class="flex-1 overflow-y-auto p-12 space-y-8 custom-scroll">
                        </div>

                    <div class="p-10">
                        <div class="max-w-3xl mx-auto flex items-center gap-4 bg-white/[0.02] border border-white/5 rounded-2xl px-6 py-4 chat-input-focus transition-all">
                            <input id="user-input" type="text" placeholder="Задайте вопрос SUI AI..." class="bg-transparent border-none outline-none flex-1 text-sm text-white/80 placeholder:text-white/10">
                            <button onclick="handleSend()" class="text-white/20 hover:text-white transition-all">
                                <i data-lucide="arrow-up-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <aside id="sui-panel" class="w-80 border-l border-white/5 bg-black/20 p-8 hidden lg:block">
            <div class="sui-gradient p-6 rounded-3xl mb-8">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-2 h-2 bg-indigo-500 rounded-full animate-ping"></div>
                    <span class="text-xs font-bold text-indigo-300 uppercase tracking-tighter">SUI AI Active</span>
                </div>
                <p class="text-sm text-white/70 leading-relaxed">
                    Я твой личный интеллект в этой системе. Знаю каждый символ кода.
                </p>
            </div>

            <div class="space-y-6">
                <h4 class="text-[10px] font-bold text-white/20 uppercase tracking-[0.2em]">История обновлений</h4>
                <div class="space-y-4">
                    <div class="flex gap-3">
                        <div class="w-1 h-1 bg-gold-500 rounded-full mt-2 shrink-0"></div>
                        <p class="text-xs text-white/50">Добавлен премиальный дизайн Elysium</p>
                    </div>
                    <div class="flex gap-3">
                        <div class="w-1 h-1 bg-gold-500 rounded-full mt-2 shrink-0"></div>
                        <p class="text-xs text-white/50">Интегрирован SUI AI ассистент</p>
                    </div>
                    <div class="flex gap-3">
                        <div class="w-1 h-1 bg-gold-500 rounded-full mt-2 shrink-0"></div>
                        <p class="text-xs text-white/50">Удалены лишние звуковые шумы</p>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        lucide.createIcons();

        // Состояние системы
        const systemInfo = {
            version: "1.2.0-Elite",
            features: [
                "Премиальный интерфейс Elysium (не копия Дискорда)",
                "Персональный бот SUI AI",
                "Система 'Тихая роскошь' с золотыми акцентами",
                "Полная приватность (локальная база данных)",
                "Улучшенные анимации появления контента"
            ],
            devDate: "27 Апреля 2026"
        };

        let messages = [
            { role: 'sui', text: 'Здравствуй. Я SUI AI. Твой Elysium готов к работе. Что ты хочешь узнать о своей системе?' }
        ];

        // Звук сообщения (мягкий)
        const msgSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2357/2357-preview.mp3');
        msgSound.volume = 0.1;

        function renderMessages() {
            const box = document.getElementById('chat-box');
            box.innerHTML = messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} msg-anim">
                    <div class="max-w-[70%]">
                        <div class="flex items-center gap-2 mb-2 ${m.role === 'user' ? 'flex-row-reverse' : ''}">
                            <span class="text-[10px] uppercase tracking-widest ${m.role === 'user' ? 'text-white/20' : 'gold-text'}">
                                ${m.role === 'user' ? 'Владелец' : 'SUI AI'}
                            </span>
                        </div>
                        <div class="p-5 rounded-3xl text-sm leading-relaxed ${m.role === 'user' ? 'bg-white/5 text-white/90 rounded-tr-none' : 'sui-gradient text-white/80 rounded-tl-none'}">
                            ${m.text}
                        </div>
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim().toLowerCase();
            if(!text) return;

            messages.push({ role: 'user', text: input.value });
            input.value = '';
            renderMessages();

            // Логика SUI AI
            setTimeout(() => {
                msgSound.play();
                let response = "Я анализирую твой запрос... Для получения деталей о системе спроси 'что добавлено'.";
                
                if(text.includes("что добавлено") || text.includes("детали") || text.includes("обновления")) {
                    response = `Вот подробности последнего обновления Elysium:<br><br>` + 
                               systemInfo.features.map(f => `• ${f}`).join('<br>');
                } else if (text.includes("привет") || text.includes("кто ты")) {
                    response = "Я — SUI AI, твой персональный проводник в Elysium. Я помогу тебе управлять задачами и следить за обновлениями твоего кода.";
                }

                messages.push({ role: 'sui', text: response });
                renderMessages();
            }, 800);
        }

        function changeView(view) {
            const title = document.getElementById('header-main');
            if(view === 'sui') {
                title.innerHTML = "Диалог с <span class='gold-text'>SUI AI</span>";
            } else {
                title.innerHTML = "Добро пожаловать в <span class='gold-text'>Elysium</span>";
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') handleSend();
        });

        window.onload = renderMessages;
    </script>
</body>
</html>

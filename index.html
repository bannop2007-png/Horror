<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniCord | Discord Style Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1e1f22;
            color: #dbdee1;
            height: 100vh;
            overflow: hidden;
        }

        /* Цвета Discord */
        .bg-guilds { background-color: #1e1f22; }
        .bg-channels { background-color: #2b2d31; }
        .bg-chat { background-color: #313338; }
        .bg-members { background-color: #2b2d31; }
        
        .guild-icon {
            transition: all 0.2s ease;
            border-radius: 50%;
        }
        .guild-icon:hover {
            border-radius: 30%;
            background-color: #5865f2;
            color: white;
        }
        .guild-icon.active {
            border-radius: 30%;
            background-color: #5865f2;
            color: white;
        }

        .channel-link:hover {
            background-color: #3f4147;
            color: #f2f3f5;
        }
        
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <nav class="bg-guilds w-[72px] flex flex-col items-center py-3 gap-2 border-r border-black/20">
        <div class="guild-icon active w-12 h-12 bg-[#313338] flex items-center justify-center cursor-pointer text-[#5865f2] mb-2">
            <i data-lucide="message-square"></i>
        </div>
        <div class="w-8 h-[2px] bg-[#35363c] mb-2"></div>
        <div onclick="playUISound('click')" class="guild-icon w-12 h-12 bg-[#313338] flex items-center justify-center cursor-pointer hover:text-white transition-all">
            <i data-lucide="plus"></i>
        </div>
        <div onclick="playUISound('click')" class="guild-icon w-12 h-12 bg-[#313338] flex items-center justify-center cursor-pointer hover:text-white transition-all">
            <i data-lucide="compass"></i>
        </div>
    </nav>

    <aside class="bg-channels w-60 flex flex-col">
        <header class="h-12 shadow-sm flex items-center px-4 font-bold text-white border-b border-black/10">
            OmniHub Project
        </header>
        
        <div class="flex-1 overflow-y-auto py-4 px-2 space-y-4">
            <div>
                <div class="text-[12px] font-bold uppercase text-[#949ba4] px-2 mb-1 flex justify-between items-center">
                    <span>Текстовые каналы</span>
                    <i data-lucide="plus" class="w-3 h-3 cursor-pointer"></i>
                </div>
                <div class="space-y-0.5">
                    <div onclick="switchChannel('general')" class="channel-link flex items-center gap-2 p-2 rounded-md cursor-pointer text-[#949ba4] bg-[#3f4147] text-white">
                        <i data-lucide="hash" class="w-4 h-4"></i> general
                    </div>
                    <div onclick="switchChannel('dev')" class="channel-link flex items-center gap-2 p-2 rounded-md cursor-pointer text-[#949ba4]">
                        <i data-lucide="hash" class="w-4 h-4"></i> development
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-[#232428] p-2 flex items-center gap-2">
            <div class="relative">
                <div class="w-8 h-8 bg-indigo-500 rounded-full"></div>
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#232428] rounded-full"></div>
            </div>
            <div class="flex-1 overflow-hidden">
                <p class="text-sm font-bold text-white truncate">User_2026</p>
                <p class="text-[11px] text-[#949ba4]">#0001</p>
            </div>
            <div class="flex text-[#b5bac1] gap-1">
                <i data-lucide="mic" class="w-4 h-4 cursor-pointer hover:text-white"></i>
                <i data-lucide="settings" class="w-4 h-4 cursor-pointer hover:text-white"></i>
            </div>
        </div>
    </aside>

    <main class="bg-chat flex-1 flex flex-col">
        <header class="h-12 flex items-center px-4 border-b border-black/10 shadow-sm gap-2">
            <i data-lucide="hash" class="text-[#80848e] w-5 h-5"></i>
            <span class="font-bold text-white" id="channel-name">general</span>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-6 custom-scroll">
            </div>

        <div class="px-4 pb-6">
            <div class="bg-[#383a40] rounded-lg p-2 flex items-center gap-3">
                <div class="p-2 bg-[#b5bac1] hover:bg-white rounded-full cursor-pointer text-[#313338] transition">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                </div>
                <input id="chat-input" type="text" placeholder="Написать в #general" class="bg-transparent border-none outline-none flex-1 text-[#dbdee1] py-2">
                <div class="flex gap-3 px-2 text-[#b5bac1]">
                    <i data-lucide="gift" class="cursor-pointer hover:text-white"></i>
                    <i data-lucide="sticky-note" class="cursor-pointer hover:text-white"></i>
                    <i data-lucide="smile" class="cursor-pointer hover:text-white"></i>
                </div>
            </div>
        </div>
    </main>

    <aside class="bg-members w-60 hidden lg:flex flex-col p-4">
        <h3 class="text-[12px] font-bold uppercase text-[#949ba4] mb-4">В сети — 1</h3>
        <div class="flex items-center gap-3 p-2 rounded-md hover:bg-[#3f4147] cursor-pointer group">
            <div class="relative">
                <div class="w-8 h-8 bg-indigo-500 rounded-full"></div>
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#2b2d31] rounded-full"></div>
            </div>
            <span class="text-[#949ba4] group-hover:text-white font-medium">User_2026</span>
        </div>
    </aside>

    <script>
        lucide.createIcons();

        // Адекватные звуки (стандартные UI звуки)
        const sounds = {
            click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'), // Мягкий щелчок
            message: new Audio('https://assets.mixkit.co/active_storage/sfx/2357/2357-preview.mp3'), // Звук сообщения
            send: new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3') // Вуш отправки
        };

        // Настройка громкости
        Object.values(sounds).forEach(s => s.volume = 0.2);

        function playUISound(name) {
            sounds[name].currentTime = 0;
            sounds[name].play().catch(e => console.log("Sound muted until interaction"));
        }

        let currentChannel = 'general';
        const chatData = {
            general: [{ user: 'System', text: 'Добро пожаловать в общий чат OmniCord!', time: '12:00' }],
            dev: [{ user: 'System', text: 'Здесь обсуждаем разработку приложения.', time: '12:01' }]
        };

        function switchChannel(name) {
            playUISound('click');
            currentChannel = name;
            document.getElementById('channel-name').innerText = name;
            document.getElementById('chat-input').placeholder = `Написать в #${name}`;
            renderMessages();
        }

        function renderMessages() {
            const box = document.getElementById('chat-messages');
            box.innerHTML = chatData[currentChannel].map(m => `
                <div class="flex gap-4 group">
                    <div class="w-10 h-10 bg-indigo-600 rounded-full flex-shrink-0"></div>
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-white hover:underline cursor-pointer">${m.user}</span>
                            <span class="text-[10px] text-[#949ba4]">${m.time}</span>
                        </div>
                        <p class="text-[#dbdee1] leading-relaxed">${m.text}</p>
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;

            playUISound('send');
            chatData[currentChannel].push({
                user: 'User_2026',
                text: input.value,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            
            const text = input.value;
            input.value = '';
            renderMessages();

            // Имитация ответа
            setTimeout(() => {
                playUISound('message');
                chatData[currentChannel].push({
                    user: 'Bot',
                    text: `Принял твой запрос: "${text}". Всё работает стабильно.`,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                });
                renderMessages();
            }, 1000);
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });

        window.onload = renderMessages;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ECHOES OF THE ABYSS - Fixed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Roboto:wght@400;700&display=swap');

        :root { --blood: #8a0000; --dark: #050505; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Roboto', sans-serif; user-select: none; -webkit-user-select: none; }
        
        /* UI LAYERS */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; transition: opacity 0.5s; }
        .hidden { opacity: 0; pointer-events: none; display: none !important; }

        /* TYPOGRAPHY & BUTTONS */
        h1 { font-family: 'Creepster', cursive; font-size: 4rem; color: var(--blood); text-shadow: 0 0 20px red; margin-bottom: 20px; text-align: center; }
        .btn { background: transparent; border: 2px solid var(--blood); color: #fff; padding: 15px 40px; font-size: 1.5rem; margin: 10px; cursor: pointer; font-family: 'Creepster', cursive; transition: 0.3s; min-width: 200px; text-transform: uppercase; }
        .btn:hover { background: var(--blood); box-shadow: 0 0 20px var(--blood); transform: scale(1.05); }
        .btn-small { font-size: 1rem; padding: 10px 20px; min-width: 150px; }

        /* HUD */
        #hud { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; color: white; text-shadow: 1px 1px 2px black; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 10px; border-left: 4px solid var(--blood); min-width: 150px; }
        .bar { width: 100%; height: 8px; background: #333; margin-top: 5px; }
        .fill { height: 100%; background: #d32f2f; width: 100%; transition: width 0.2s; }
        
        /* MOBILE CONTROLS */
        #mobile-controls { display: none; position: absolute; bottom: 20px; width: 100%; height: 150px; pointer-events: none; }
        .joystick-area { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; touch-action: none; border: 2px solid rgba(255,255,255,0.3); }
        .joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .action-btn { position: absolute; bottom: 30px; right: 20px; width: 70px; height: 70px; background: rgba(138, 0, 0, 0.6); border: 2px solid red; border-radius: 50%; color: white; font-weight: bold; font-size: 1.2rem; pointer-events: auto; display: flex; justify-content: center; align-items: center; user-select: none; }
        .action-btn:active { background: red; }
        #btn-run { right: 100px; background: rgba(255, 200, 0, 0.4); border-color: orange; }

        /* EFFECTS */
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 150px black; pointer-events: none; z-index: 5; }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 50%, red 150%); opacity: 0; pointer-events: none; z-index: 6; transition: opacity 0.2s; }
        
        /* SETTINGS MODAL */
        #settings-modal { background: rgba(10,10,10,0.95); padding: 20px; border: 1px solid #333; max-width: 400px; width: 90%; }
        .setting-row { display: flex; justify-content: space-between; margin: 10px 0; color: #ccc; }
        select, input { background: #222; color: white; border: 1px solid #444; padding: 5px; }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            #mobile-controls { display: block; }
            .desktop-hint { display: none; }
        }
    </style>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- 3D Container -->
    <div id="game-container"></div>
    
    <!-- Effects -->
    <div id="vignette"></div>
    <div id="damage-overlay"></div>

    <!-- UI Layer -->
    <div id="ui-layer">
        
        <!-- MAIN MENU -->
        <div id="main-menu" class="screen">
            <h1>ECHOES OF THE ABYSS</h1>
            <button class="btn" onclick="showDeviceSelect()">PLAY</button>
            <button class="btn" onclick="toggleSettings()">SETTINGS</button>
            <p class="desktop-hint" style="color:#666; margin-top:20px;">PC: WASD + Mouse | Mobile: Touch Controls</p>
        </div>

        <!-- DEVICE SELECT -->
        <div id="device-select" class="screen hidden">
            <h2 style="color:white; font-family:'Creepster'; font-size:2rem;">SELECT PLATFORM</h2>
            <button class="btn" onclick="startGame('pc')">🖥 PC</button>
            <button class="btn" onclick="startGame('mobile')">📱 Mobile</button>
            <button class="btn btn-small" onclick="showMainMenu()" style="margin-top:20px; border-color:#555; color:#aaa;">Back</button>
        </div>

        <!-- SETTINGS -->
        <div id="settings-screen" class="screen hidden">
            <div id="settings-modal">
                <h2 style="color:var(--blood); font-family:'Creepster'; text-align:center;">SETTINGS</h2>
                <div class="setting-row">
                    <span>Sensitivity</span>
                    <input type="range" id="sens-slider" min="1" max="10" value="5" oninput="updateSettings()">
                </div>
                <div class="setting-row">
                    <span>Graphics</span>
                    <select id="gfx-select" onchange="updateSettings()">
                        <option value="low">Low</option>
                        <option value="high" selected>High</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span>Volume</span>
                    <input type="range" id="vol-slider" min="0" max="100" value="50" oninput="updateSettings()">
                </div>
                <button class="btn btn-small" onclick="toggleSettings()" style="width:100%; margin-top:20px;">Close</button>
            </div>
        </div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="stat-box">
                <div>HEALTH</div>
                <div class="bar"><div id="health-fill" class="fill"></div></div>
                <div style="margin-top:5px; font-size:0.8rem;">KEYS: <span id="keys-count" style="color:gold">0</span>/3</div>
            </div>
            <div id="mobile-hints" style="display:none; text-align:right;">
                <div style="font-size:0.8rem; color:#aaa;">Touch & Drag to Look</div>
            </div>
        </div>

        <!-- GAME OVER / WIN -->
        <div id="end-screen" class="screen hidden">
            <h1 id="end-title">GAME OVER</h1>
            <p id="end-reason" style="color:#ccc; margin-bottom:20px;"></p>
            <button class="btn" onclick="location.reload()">Main Menu</button>
        </div>
    </div>

    <!-- MOBILE CONTROLS -->
    <div id="mobile-controls">
        <div class="joystick-area" id="joystick">
            <div class="joystick-knob" id="joystick-knob"></div>
        </div>
        <div class="action-btn" id="btn-run">RUN</div>
        <div class="action-btn" id="btn-interact" style="bottom: 110px;">E</div>
    </div>

<script>
/**
 * FULL GAME LOGIC - SINGLE FILE ARCHITECTURE
 * Fixes: Audio Context, Device Detection, State Management
 */

// --- CONFIG & STATE ---
const CONFIG = {
    pcSpeed: 6.0, runSpeed: 11.0, sens: 0.002,
    mobileSpeed: 4.0, mobileRun: 7.0,
    enemySpeed: 3.5, viewDist: 20,
    keysNeeded: 3
};

let state = {
    isPlaying: false, isPaused: false, platform: 'pc',
    health: 100, keys: 0, stamina: 100,
    settings: { sens: 0.002, gfx: 'high', vol: 0.5 }
};

// --- THREE.JS GLOBALS ---
let scene, camera, renderer, controls;
let playerObj = new THREE.Object3D();
let walls = [], collectibles = [], enemy = null;
let clock = new THREE.Clock();
let audioCtx, bgmOsc;

// --- INPUT STATE ---
let input = { f:0, b:0, l:0, r:0, run:false, lookX:0, lookY:0 };

// --- INITIALIZATION ---
function init() {
    // Scene Setup
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.FogExp2(0x050505, 0.04);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('game-container').appendChild(renderer.domElement);

    // Lights
    const amb = new THREE.AmbientLight(0x404040, 0.2);
    scene.add(amb);
    
    // Flashlight
    const flash = new THREE.SpotLight(0xffffff, 1.5, 40, Math.PI/6, 0.5, 1);
    flash.position.set(0,0,0);
    flash.target.position.set(0,0,-1);
    camera.add(flash); camera.add(flash.target);
    scene.add(camera);

    // Event Listeners
    window.addEventListener('resize', onResize);
    setupInputs();
    
    // Start Loop
    animate();
}

// --- AUDIO SYSTEM (Fixed for Browsers) ---
function initAudio() {
    if(!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Start ambient drone
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 50;
        gain.gain.value = 0.02 * state.settings.vol;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        bgmOsc = osc;
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
    if(!audioCtx || state.settings.vol === 0) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    const v = state.settings.vol;

    if(type === 'step') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(100, now);
        gain.gain.setValueAtTime(0.1*v, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now+0.1);
        osc.start(now); osc.stop(now+0.1);
    } else if(type === 'key') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        gain.gain.setValueAtTime(0.2*v, now);
        gain.gain.linearRampToValueAtTime(0, now+0.3);
        osc.start(now); osc.stop(now+0.3);
    } else if(type === 'scare') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, now);
        osc.frequency.linearRampToValueAtTime(50, now+0.5);
        gain.gain.setValueAtTime(0.3*v, now);
        gain.gain.linearRampToValueAtTime(0, now+0.5);
        osc.start(now); osc.stop(now+0.5);
    }
}

// --- GAME FLOW ---
function showDeviceSelect() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('device-select').classList.remove('hidden');
}

function showMainMenu() {
    document.getElementById('device-select').classList.add('hidden');
    document.getElementById('settings-screen').classList.add('hidden');
    document.getElementById('main-menu').classList.remove('hidden');
}

function toggleSettings() {
    const el = document.getElementById('settings-screen');
    el.classList.toggle('hidden');
    if(!el.classList.contains('hidden')) {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('device-select').classList.add('hidden');
    } else {
        showMainMenu();
    }
}

function updateSettings() {
    state.settings.sens = document.getElementById('sens-slider').value / 1000;
    state.settings.vol = document.getElementById('vol-slider').value / 100;
    const gfx = document.getElementById('gfx-select').value;
    renderer.shadowMap.enabled = (gfx === 'high');
    renderer.antialias = (gfx === 'high');
}

function startGame(platform) {
    state.platform = platform;
    state.isPlaying = true;
    state.health = 100;
    state.keys = 0;
    
    initAudio();
    generateLevel();
    
    // UI Updates
    document.getElementById('device-select').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    if(platform === 'mobile') document.getElementById('mobile-hints').style.display = 'block';
    
    // Lock Pointer for PC
    if(platform === 'pc') {
        document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
        document.body.requestPointerLock();
    }
}

// --- WORLD GENERATION ---
function generateLevel() {
    // Clear old
    walls.forEach(w => scene.remove(w));
    collectibles.forEach(c => scene.remove(c.mesh));
    if(enemy) scene.remove(enemy.mesh);
    walls = []; collectibles = [];

    // Simple Grid Map
    const size = 20;
    const cell = 4;
    const geo = new THREE.BoxGeometry(cell, 4, cell);
    const mat = new THREE.MeshStandardMaterial({ color: 0x333333 });

    // Borders
    for(let i=0; i<size; i++) {
        createWall(i*cell - size*cell/2, 2, -size*cell/2);
        createWall(i*cell - size*cell/2, 2, size*cell/2);
        createWall(-size*cell/2, 2, i*cell - size*cell/2);
        createWall(size*cell/2, 2, i*cell - size*cell/2);
    }
    
    // Random Obstacles
    for(let i=0; i<30; i++) {
        let x = (Math.random()-0.5) * size * cell;
        let z = (Math.random()-0.5) * size * cell;
        if(Math.abs(x) > 5 || Math.abs(z) > 5) createWall(x, 2, z);
    }

    // Floor
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(size*cell, size*cell), new THREE.MeshStandardMaterial({color:0x111111}));
    floor.rotation.x = -Math.PI/2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Keys
    for(let i=0; i<CONFIG.keysNeeded; i++) {
        spawnItem('key');
    }

    // Enemy
    createEnemy();

    // Player Pos
    playerObj.position.set(0, 1.7, 0);
    camera.position.copy(playerObj.position);
}

function createWall(x,y,z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(4,4,4), new THREE.MeshStandardMaterial({color:0x222222}));
    m.position.set(x,y,z);
    m.castShadow = true; m.receiveShadow = true;
    scene.add(m);
    walls.push(m);
}

function spawnItem(type) {
    const geo = new THREE.TorusKnotGeometry(0.3, 0.1, 16, 8);
    const mat = new THREE.MeshStandardMaterial({color:0xffd700, emissive:0xaa6600, emissiveIntensity:0.5});
    const mesh = new THREE.Mesh(geo, mat);
    let x, z;
    do {
        x = (Math.random()-0.5)*60;
        z = (Math.random()-0.5)*60;
    } while(Math.sqrt(x*x+z*z) < 10);
    
    mesh.position.set(x, 1, z);
    const light = new THREE.PointLight(0xffd700, 1, 5);
    mesh.add(light);
    scene.add(mesh);
    collectibles.push({mesh, type});
}

function createEnemy() {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5, 4, 8), new THREE.MeshStandardMaterial({color:0x1a1a1a}));
    body.position.y = 1.25;
    group.add(body);
    
    const eyes = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color:0xff0000}));
    eyes.position.set(0, 1.6, 0.3);
    group.add(eyes);
    
    const light = new THREE.PointLight(0xff0000, 1, 8);
    light.position.y = 1.5;
    group.add(light);
    
    group.position.set(20, 0, 20);
    scene.add(group);
    
    enemy = { mesh: group, state: 'patrol', target: new THREE.Vector3(20,0,20) };
}

// --- INPUT HANDLING ---
function setupInputs() {
    // Keyboard
    document.addEventListener('keydown', (e) => {
        if(e.code==='KeyW') input.f=1; if(e.code==='KeyS') input.b=1;
        if(e.code==='KeyA') input.l=1; if(e.code==='KeyD') input.r=1;
        if(e.code==='ShiftLeft') input.run=true;
        if(e.code==='KeyE') interact();
    });
    document.addEventListener('keyup', (e) => {
        if(e.code==='KeyW') input.f=0; if(e.code==='KeyS') input.b=0;
        if(e.code==='KeyA') input.l=0; if(e.code==='KeyD') input.r=0;
        if(e.code==='ShiftLeft') input.run=false;
    });
    
    // Mouse Look
    document.addEventListener('mousemove', (e) => {
        if(state.isPlaying && state.platform==='pc' && document.pointerLockElement) {
            playerObj.rotation.y -= e.movementX * state.settings.sens;
            camera.rotation.x -= e.movementY * state.settings.sens;
            camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
        }
    });

    // Mobile Touch
    const joy = document.getElementById('joystick');
    const knob = document.getElementById('joystick-knob');
    let touchId = null, startX, startY;

    joy.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.changedTouches[0];
        touchId = t.identifier;
        startX = t.clientX; startY = t.clientY;
    }, {passive:false});

    joy.addEventListener('touchmove', (e) => {
        e.preventDefault();
        for(let i=0; i<e.changedTouches.length; i++) {
            if(e.changedTouches[i].identifier === touchId) {
                const t = e.changedTouches[i];
                let dx = t.clientX - startX;
                let dy = t.clientY - startY;
                const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 35);
                const angle = Math.atan2(dy, dx);
                dx = Math.cos(angle)*dist; dy = Math.sin(angle)*dist;
                
                knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                
                // Normalize input -1 to 1
                input.l = dx < -10 ? 1 : 0; input.r = dx > 10 ? 1 : 0;
                input.f = dy < -10 ? 1 : 0; input.b = dy > 10 ? 1 : 0;
            }
        }
    }, {passive:false});

    const endTouch = (e) => {
        e.preventDefault();
        for(let i=0; i<e.changedTouches.length; i++) {
            if(e.changedTouches[i].identifier === touchId) {
                touchId = null;
                knob.style.transform = `translate(-50%, -50%)`;
                input.f=input.b=input.l=input.r=0;
            }
        }
    };
    joy.addEventListener('touchend', endTouch);
    joy.addEventListener('touchcancel', endTouch);

    // Mobile Buttons
    document.getElementById('btn-run').addEventListener('touchstart', (e)=>{e.preventDefault(); input.run=true;});
    document.getElementById('btn-run').addEventListener('touchend', (e)=>{e.preventDefault(); input.run=false;});
    document.getElementById('btn-interact').addEventListener('touchstart', (e)=>{e.preventDefault(); interact();});
    
    // Mobile Look (Swipe on screen)
    let lastX=0, lastY=0;
    document.addEventListener('touchstart', (e)=>{ if(e.target.id !== 'joystick' && !e.target.classList.contains('action-btn')) { lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }});
    document.addEventListener('touchmove', (e)=>{ 
        if(state.isPlaying && state.platform==='mobile' && e.target.id !== 'joystick' && !e.target.classList.contains('action-btn')) {
            const x = e.touches[0].clientX;
            const y = e.touches[0].clientY;
            playerObj.rotation.y -= (x-lastX)*0.005;
            camera.rotation.x -= (y-lastY)*0.005;
            camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            lastX=x; lastY=y;
        }
    });
}

function interact() {
    if(!state.isPlaying) return;
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = ray.intersectObjects(collectibles.map(c=>c.mesh));
    if(hits.length > 0 && hits[0].distance < 3) {
        const item = collectibles.find(c=>c.mesh===hits[0].object);
        if(item) {
            scene.remove(item.mesh);
            collectibles = collectibles.filter(c=>c!==item);
            state.keys++;
            document.getElementById('keys-count').innerText = state.keys;
            playSound('key');
            if(state.keys >= CONFIG.keysNeeded) winGame();
        }
    }
}

// --- GAME LOOP ---
function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.1);
    const time = clock.getElapsedTime();

    if(state.isPlaying && !state.isPaused) {
        // Player Move
        const speed = input.run ? (state.platform==='pc'?CONFIG.runSpeed:CONFIG.mobileRun) : (state.platform==='pc'?CONFIG.pcSpeed:CONFIG.mobileSpeed);
        const dir = new THREE.Vector3();
        const forward = new THREE.Vector3(0,0,-1).applyQuaternion(playerObj.quaternion);
        const right = new THREE.Vector3(1,0,0).applyQuaternion(playerObj.quaternion);
        
        if(input.f) dir.add(forward);
        if(input.b) dir.sub(forward);
        if(input.r) dir.add(right);
        if(input.l) dir.sub(right);
        
        if(dir.length()>0) {
            dir.normalize();
            playerObj.position.add(dir.multiplyScalar(speed * delta));
            if(time % 0.5 < 0.1) playSound('step');
        }
        
        camera.position.copy(playerObj.position);

        // Enemy AI
        if(enemy) {
            const dist = enemy.mesh.position.distanceTo(playerObj.position);
            const canSee = dist < CONFIG.viewDist; // Simplified LOS
            
            if(canSee) {
                enemy.state = 'chase';
                const dirE = playerObj.position.clone().sub(enemy.mesh.position).normalize();
                dirE.y = 0;
                enemy.mesh.position.add(dirE.multiplyScalar(CONFIG.enemySpeed * delta));
                enemy.mesh.lookAt(playerObj.position.x, enemy.mesh.position.y, playerObj.position.z);
                
                if(dist < 1.5) takeDamage(1);
            } else {
                enemy.state = 'patrol';
                if(enemy.mesh.position.distanceTo(enemy.target) < 1) {
                    enemy.target.set((Math.random()-0.5)*60, 0, (Math.random()-0.5)*60);
                }
                const dirE = enemy.target.clone().sub(enemy.mesh.position).normalize();
                enemy.mesh.position.add(dirE.multiplyScalar(1.5 * delta));
                enemy.mesh.lookAt(enemy.target.x, enemy.mesh.position.y, enemy.target.z);
            }
            
            // Horror FX
            const intensity = Math.max(0, (15-dist)/15);
            document.getElementById('vignette').style.boxShadow = `inset 0 0 ${100+intensity*100}px ${intensity*50}px black`;
            if(dist < 5) playSound('scare');
        }

        // Items Animation
        collectibles.forEach(c => c.mesh.rotation.y += delta);
    }
    
    renderer.render(scene, camera);
}

function takeDamage(amount) {
    state.health -= amount;
    document.getElementById('health-fill').style.width = state.health + '%';
    document.getElementById('damage-overlay').style.opacity = 0.8;
    setTimeout(()=>document.getElementById('damage-overlay').style.opacity=0, 200);
    
    if(state.health <= 0) gameOver();
}

function gameOver() {
    state.isPlaying = false;
    document.exitPointerLock();
    document.getElementById('end-screen').classList.remove('hidden');
    document.getElementById('end-title').innerText = "YOU DIED";
    document.getElementById('end-reason').innerText = "The Stalker caught you.";
}

function winGame() {
    state.isPlaying = false;
    document.exitPointerLock();
    document.getElementById('end-screen').classList.remove('hidden');
    document.getElementById('end-title').innerText = "ESCAPED!";
    document.getElementById('end-reason').innerText = "You found all keys and survived.";
    document.getElementById('end-title').style.color = "gold";
}

function onResize() {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// Boot
init();
</script>
</body>
</html>

<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Notes App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    margin-top: 20px;
}

.container {
    width: 90%;
    max-width: 500px;
}

input {
    width: 70%;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #00c9a7;
    color: white;
    cursor: pointer;
}

.note {
    background: rgba(255,255,255,0.1);
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
}

.delete {
    background: red;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
}
</style>

</head>

<body>

<h1>📱 Заметки</h1>

<div class="container">
    <input id="noteInput" placeholder="Введите заметку...">
    <button onclick="addNote()">Добавить</button>

```
<div id="notes"></div>
```

</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

function renderNotes() {
    const container = document.getElementById("notes");
    container.innerHTML = "";

    notes.forEach((note, index) => {
        const div = document.createElement("div");
        div.className = "note";

        div.innerHTML = `
            <span>${note}</span>
            <span class="delete" onclick="deleteNote(${index})">X</span>
        `;

        container.appendChild(div);
    });
}

function addNote() {
    const input = document.getElementById("noteInput");
    if (input.value.trim() === "") return;

    notes.push(input.value);
    localStorage.setItem("notes", JSON.stringify(notes));
    input.value = "";
    renderNotes();
}

function deleteNote(index) {
    notes.splice(index, 1);
    localStorage.setItem("notes", JSON.stringify(notes));
    renderNotes();
}

renderNotes();
</script>

</body>
</html>

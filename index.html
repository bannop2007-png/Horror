<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium Imperial | Prime OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.08); }
        .gold { color: #d4af37; }
        .gold-border { border-color: rgba(212, 175, 55, 0.3); }
        
        /* Stories Style */
        .story-card { min-width: 120px; height: 160px; border-radius: 20px; background: linear-gradient(to bottom, rgba(212,175,55,0.2), rgba(0,0,0,0.8)); border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .story-card:hover { transform: translateY(-5px); border-color: #d4af37; }
        
        .msg-bubble { max-width: 75%; padding: 12px 18px; border-radius: 22px; font-size: 14px; margin-bottom: 8px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex p-4 gap-4 h-screen">

    <nav class="w-20 glass rounded-[35px] flex flex-col items-center py-10 gap-8 shadow-2xl">
        <div class="gold text-2xl font-bold italic">Σ</div>
        <button onclick="showTab('chat')" class="p-3 text-white/40 hover:text-gold transition-all"><i data-lucide="message-square"></i></button>
        <button onclick="showTab('updates')" class="p-3 text-white/40 hover:text-gold transition-all"><i data-lucide="layout-grid"></i></button>
        <button onclick="showTab('profile')" class="p-3 text-white/40 hover:text-gold transition-all"><i data-lucide="user-circle"></i></button>
        <div class="mt-auto">
            <div id="status-led" class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
        </div>
    </nav>

    <div class="flex-1 flex flex-col gap-4">
        
        <div id="stories-container" class="h-44 flex gap-4 overflow-x-auto custom-scroll pb-2">
            <div class="story-card flex flex-col justify-end p-4 border-dashed border-gold/50" onclick="addStory()">
                <i data-lucide="plus" class="w-6 h-6 text-gold mb-2"></i>
                <p class="text-[10px] font-bold uppercase">Add Story</p>
            </div>
        </div>

        <main class="flex-1 glass rounded-[40px] overflow-hidden flex relative">
            
            <section id="tab-chat" class="flex-1 flex flex-col p-8">
                <header class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-xl font-light">Imperial <span class="gold">Channel</span></h2>
                        <p id="peer-status" class="text-[10px] text-white/20 uppercase tracking-widest">No active connection</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="startVoiceCall()" class="p-3 glass rounded-full text-green-500 hover:bg-green-500 hover:text-white transition-all"><i data-lucide="phone"></i></button>
                    </div>
                </header>
                
                <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 pr-4 custom-scroll"></div>
                
                <div class="mt-6 flex gap-3 bg-white/5 p-2 rounded-[25px] border border-white/5 focus-within:gold-border transition-all">
                    <input id="msg-input" type="text" placeholder="Зашифрованное сообщение..." class="flex-1 bg-transparent border-none outline-none px-6 text-sm">
                    <button onclick="sendMsg()" class="bg-[#d4af37] text-black p-4 rounded-[20px] hover:scale-105 transition"><i data-lucide="zap" class="w-5 h-5"></i></button>
                </div>
            </section>

            <section id="tab-profile" class="hidden flex-1 p-12">
                <h2 class="text-3xl font-light mb-10">System <span class="gold">Profile</span></h2>
                <div class="max-w-md space-y-8">
                    <div class="flex items-center gap-6 mb-10">
                        <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-gold to-transparent p-1">
                            <div id="profile-img" class="w-full h-full bg-black rounded-full flex items-center justify-center">
                                <i data-lucide="user" class="w-10 h-10 text-white/20"></i>
                            </div>
                        </div>
                        <button onclick="changeAvatar()" class="text-xs text-gold underline">Изменить фото</button>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] uppercase text-white/30 tracking-widest">Отображаемое имя</label>
                            <input id="prof-name" type="text" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 outline-none focus:border-gold">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase text-white/30 tracking-widest">Персональный ID (Буквы и цифры)</label>
                            <input id="prof-id" type="text" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 outline-none focus:border-gold" placeholder="например: king777">
                        </div>
                    </div>
                    <button onclick="saveProfile()" class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:bg-gold transition">Сохранить изменения</button>
                </div>
            </section>

            <div id="call-screen" class="hidden absolute inset-0 bg-black/90 backdrop-blur-xl flex flex-col items-center justify-center z-50">
                <div class="w-32 h-32 rounded-full border-2 border-gold animate-pulse mb-8 flex items-center justify-center">
                    <i data-lucide="mic" class="w-12 h-12 text-gold"></i>
                </div>
                <h3 class="text-2xl font-light mb-2">Голосовой канал</h3>
                <p id="call-timer" class="text-gold text-xs mb-12 uppercase tracking-widest">00:00</p>
                <button onclick="endCall()" class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center hover:scale-110 transition"><i data-lucide="phone-off"></i></button>
            </div>

        </main>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        lucide.createIcons();
        
        let userConfig = JSON.parse(localStorage.getItem('elysium_user')) || {
            name: 'Elite User',
            id: 'elysium_' + Math.random().toString(36).substr(2, 5),
            stories: [
                { title: 'Welcome', desc: 'Система Elysium v4 запущена.' },
                { title: 'Update', desc: 'Добавлены звонки и профили.' }
            ]
        };

        let peer, conn, currentCall, myStream;

        // Инициализация системы
        function initSystem() {
            document.getElementById('prof-name').value = userConfig.name;
            document.getElementById('prof-id').value = userConfig.id;
            
            // Запуск Peer с кастомным ID
            peer = new Peer(userConfig.id);
            
            peer.on('open', (id) => {
                document.getElementById('status-led').style.backgroundColor = '#22c55e';
                console.log("System Online: " + id);
                renderStories();
            });

            peer.on('connection', (c) => {
                conn = c;
                setupChat();
            });

            peer.on('call', (call) => {
                if(confirm("Входящий вызов. Принять?")) {
                    navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                        myStream = stream;
                        call.answer(stream);
                        showCallScreen(call);
                    });
                }
            });
        }

        function saveProfile() {
            const newId = document.getElementById('prof-id').value.trim();
            const newName = document.getElementById('prof-name').value.trim();
            
            if(newId !== userConfig.id) {
                alert("ID изменен. Система будет перезагружена для обновления узла.");
            }
            
            userConfig.name = newName;
            userConfig.id = newId;
            localStorage.setItem('elysium_user', JSON.stringify(userConfig));
            location.reload();
        }

        function renderStories() {
            const container = document.getElementById('stories-container');
            const staticContent = container.firstElementChild.outerHTML;
            container.innerHTML = staticContent + userConfig.stories.map(s => `
                <div class="story-card flex flex-col justify-end p-4">
                    <p class="text-[10px] font-bold text-gold uppercase mb-1">${s.title}</p>
                    <p class="text-[9px] text-white/60 leading-tight">${s.desc}</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addStory() {
            const title = prompt("Заголовок обновления:");
            const desc = prompt("Что нового?");
            if(title && desc) {
                userConfig.stories.unshift({title, desc});
                localStorage.setItem('elysium_user', JSON.stringify(userConfig));
                renderStories();
            }
        }

        // --- ЛОГИКА СВЯЗИ ---
        function showTab(tab) {
            ['chat', 'profile', 'updates'].forEach(t => {
                const el = document.getElementById('tab-' + t);
                if(el) el.classList.toggle('hidden', t !== tab);
            });
        }

        function startVoiceCall() {
            const targetId = prompt("Введите ID друга для звонка:");
            if(!targetId) return;
            
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                myStream = stream;
                const call = peer.call(targetId, stream);
                showCallScreen(call);
            }).catch(() => alert("Микрофон недоступен. Проверьте HTTPS или настройки браузера."));
        }

        function showCallScreen(call) {
            currentCall = call;
            document.getElementById('call-screen').classList.remove('hidden');
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-audio').srcObject = remoteStream;
            });
        }

        function endCall() {
            if(currentCall) currentCall.close();
            if(myStream) myStream.getTracks().forEach(t => t.stop());
            document.getElementById('call-screen').classList.add('hidden');
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            const targetId = prompt("Введите ID друга для отправки (если еще не соединены):", conn ? conn.peer : "");
            
            if(!conn || conn.peer !== targetId) {
                conn = peer.connect(targetId);
                setupChat();
            }

            setTimeout(() => {
                conn.send({ user: userConfig.name, text: input.value });
                addBubble(userConfig.name, input.value, 'right');
                input.value = '';
            }, 500);
        }

        function setupChat() {
            conn.on('open', () => {
                document.getElementById('peer-status').innerText = "Connected to: " + conn.peer;
                addBubble('System', 'Канал связи открыт', 'center');
            });
            conn.on('data', (data) => {
                addBubble(data.user, data.text, 'left');
            });
        }

        function addBubble(name, text, side) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `flex ${side === 'right' ? 'justify-end' : side === 'left' ? 'justify-start' : 'justify-center'}`;
            
            const style = side === 'right' ? 'bg-indigo-600 text-white' : side === 'left' ? 'bg-white/10 text-white' : 'text-white/20 text-[10px]';
            div.innerHTML = `<div class="msg-bubble ${style}">${side !== 'center' ? `<p class="text-[9px] opacity-50 mb-1">${name}</p>` : ''}${text}</div>`;
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        window.onload = initSystem;
    </script>
</body>
</html>
